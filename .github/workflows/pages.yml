name: pages
on:
  push:
      branches:
        - main
  workflow_dispatch:
  permissions:
    contents: read
    pages: write
  jobs:
    deploy:
      runs-on: ubuntu-latest
      environemnt:
        name: github-pages
        url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
